name: Bug report
description: Report a problem with the detection layer or the public client.
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: NoNans version
      placeholder: "1.0.4"
    validations:
      required: true
  - type: input
    id: torch
    attributes:
      label: PyTorch version
      placeholder: "2.5.0"
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: GPU model and CUDA version
      placeholder: "H100 SXM5, CUDA 12.4"
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A small Python script that triggers the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: events
    attributes:
      label: Contents of .nonans/events.jsonl
      description: If applicable. Paste the relevant lines.
      render: json
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true
